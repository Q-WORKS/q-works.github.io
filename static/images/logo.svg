<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 300" width="340" height="300">
  <defs>
    <linearGradient id="blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1b3f6e"/>
      <stop offset="100%" style="stop-color:#2e6daa"/>
    </linearGradient>
    <!-- clip to circle interior for the rack -->
    <clipPath id="innerQ">
      <circle cx="160" cy="142" r="77"/>
    </clipPath>
  </defs>

  <!-- ── Q RING ── -->
  <circle cx="160" cy="142" r="95" fill="none" stroke="url(#blue)" stroke-width="17"/>

  <!-- Q tail -->
  <line x1="222" y1="204" x2="264" y2="248"
        stroke="url(#blue)" stroke-width="17" stroke-linecap="round"/>

  <!-- ── HPC RACK inside the Q (clipped to inner circle) ── -->
  <g clip-path="url(#innerQ)" opacity="0.88">
    <!-- Rack chassis outline -->
    <rect x="120" y="90" width="80" height="104" rx="3"
          fill="none" stroke="#1b3f6e" stroke-width="2.5"/>

    <!-- Rack units — 6 slots -->
    <rect x="125" y="96"  width="70" height="12" rx="1.5" fill="#2e6daa" opacity="0.18"/>
    <rect x="125" y="111" width="70" height="12" rx="1.5" fill="#2e6daa" opacity="0.18"/>
    <rect x="125" y="126" width="70" height="12" rx="1.5" fill="#2e6daa" opacity="0.18"/>
    <rect x="125" y="141" width="70" height="12" rx="1.5" fill="#2e6daa" opacity="0.18"/>
    <rect x="125" y="156" width="70" height="12" rx="1.5" fill="#2e6daa" opacity="0.18"/>
    <rect x="125" y="171" width="70" height="12" rx="1.5" fill="#2e6daa" opacity="0.18"/>

    <!-- Slot borders -->
    <rect x="125" y="96"  width="70" height="12" rx="1.5" fill="none" stroke="#1b3f6e" stroke-width="1.2"/>
    <rect x="125" y="111" width="70" height="12" rx="1.5" fill="none" stroke="#1b3f6e" stroke-width="1.2"/>
    <rect x="125" y="126" width="70" height="12" rx="1.5" fill="none" stroke="#1b3f6e" stroke-width="1.2"/>
    <rect x="125" y="141" width="70" height="12" rx="1.5" fill="none" stroke="#1b3f6e" stroke-width="1.2"/>
    <rect x="125" y="156" width="70" height="12" rx="1.5" fill="none" stroke="#1b3f6e" stroke-width="1.2"/>
    <rect x="125" y="171" width="70" height="12" rx="1.5" fill="none" stroke="#1b3f6e" stroke-width="1.2"/>

    <!-- LED dots per slot -->
    <circle cx="131" cy="102" r="2.2" fill="#2e6daa"/>
    <circle cx="131" cy="117" r="2.2" fill="#2e6daa"/>
    <circle cx="131" cy="132" r="2.2" fill="#2e6daa"/>
    <circle cx="131" cy="147" r="2.2" fill="#2e6daa"/>
    <circle cx="131" cy="162" r="2.2" fill="#2e6daa"/>
    <circle cx="131" cy="177" r="2.2" fill="#2e6daa"/>

    <!-- Horizontal vent lines on each slot -->
    <g stroke="#1b3f6e" stroke-width="0.7" opacity="0.5">
      <line x1="138" y1="100" x2="188" y2="100"/>
      <line x1="138" y1="103" x2="188" y2="103"/>
      <line x1="138" y1="115" x2="188" y2="115"/>
      <line x1="138" y1="118" x2="188" y2="118"/>
      <line x1="138" y1="130" x2="188" y2="130"/>
      <line x1="138" y1="133" x2="188" y2="133"/>
      <line x1="138" y1="145" x2="188" y2="145"/>
      <line x1="138" y1="148" x2="188" y2="148"/>
      <line x1="138" y1="160" x2="188" y2="160"/>
      <line x1="138" y1="163" x2="188" y2="163"/>
      <line x1="138" y1="175" x2="188" y2="175"/>
      <line x1="138" y1="178" x2="188" y2="178"/>
    </g>
  </g>

  <!-- Orbital dashed ellipse — quantum hint -->
  <ellipse cx="160" cy="142" rx="108" ry="30" fill="none"
           stroke="#2e6daa" stroke-width="1.8" stroke-dasharray="8 6"
           transform="rotate(-22 160 142)" opacity="0.35"/>

  <!-- Qubit nodes -->
  <circle cx="122" cy="116" r="5.5" fill="#2e6daa" opacity="0.7"/>
  <circle cx="198" cy="168" r="5.5" fill="#1b3f6e" opacity="0.7"/>

  <!-- ── WORDMARK ── -->
  <line x1="20" y1="263" x2="300" y2="263"
        stroke="#2e6daa" stroke-width="1" opacity="0.35"/>

  <text x="160" y="292"
        font-family="'Helvetica Neue', 'Arial', sans-serif"
        font-size="34"
        font-weight="700"
        letter-spacing="10"
        fill="#1b3f6e"
        text-anchor="middle">Q-WORKS</text>
</svg>
