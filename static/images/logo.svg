<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 300" width="360" height="300">
  <defs>
    <linearGradient id="blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1b3f6e"/>
      <stop offset="100%" style="stop-color:#2e6daa"/>
    </linearGradient>
    <linearGradient id="flowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2e6daa"/>
      <stop offset="100%" style="stop-color:#1b3f6e"/>
    </linearGradient>
    <clipPath id="innerQ">
      <circle cx="160" cy="140" r="78"/>
    </clipPath>
  </defs>

  <!-- ── Q RING ── -->
  <circle cx="160" cy="140" r="95" fill="none" stroke="url(#blue)" stroke-width="16"/>
  <!-- Q tail -->
  <line x1="222" y1="202" x2="263" y2="245"
        stroke="url(#blue)" stroke-width="16" stroke-linecap="round"/>

  <!-- ── CONTENT INSIDE Q (clipped) ── -->
  <g clip-path="url(#innerQ)">

    <!-- === LEFT: ATOM === -->
    <!-- Nucleus -->
    <circle cx="118" cy="140" r="7" fill="#1b3f6e"/>

    <!-- Orbital 1 — horizontal ellipse -->
    <ellipse cx="118" cy="140" rx="30" ry="11" fill="none"
             stroke="#2e6daa" stroke-width="1.8"/>
    <!-- Orbital 2 — rotated 60° -->
    <ellipse cx="118" cy="140" rx="30" ry="11" fill="none"
             stroke="#2e6daa" stroke-width="1.8"
             transform="rotate(60 118 140)"/>
    <!-- Orbital 3 — rotated 120° -->
    <ellipse cx="118" cy="140" rx="30" ry="11" fill="none"
             stroke="#2e6daa" stroke-width="1.8"
             transform="rotate(120 118 140)"/>

    <!-- Electron dots -->
    <circle cx="148" cy="140" r="3.2" fill="#2e6daa"/>
    <circle cx="103" cy="127" r="3.2" fill="#2e6daa"/>
    <circle cx="133" cy="153" r="3.2" fill="#2e6daa"/>

    <!-- === FLOW CONNECTION (center, between atom and rack) === -->
    <!-- Three parallel wavy flow lines -->
    <path d="M 152 132 C 158 128, 162 136, 168 132" fill="none" stroke="url(#flowGrad)" stroke-width="1.6" stroke-linecap="round"/>
    <path d="M 152 140 C 158 136, 162 144, 168 140" fill="none" stroke="url(#flowGrad)" stroke-width="1.6" stroke-linecap="round"/>
    <path d="M 152 148 C 158 144, 162 152, 168 148" fill="none" stroke="url(#flowGrad)" stroke-width="1.6" stroke-linecap="round"/>
    <!-- Arrow tip -->
    <polygon points="168,135 174,140 168,145" fill="#1b3f6e" opacity="0.75"/>

    <!-- === RIGHT: HPC RACK === -->
    <!-- Chassis -->
    <rect x="176" y="108" width="46" height="64" rx="2.5"
          fill="none" stroke="#1b3f6e" stroke-width="2"/>
    <!-- 4 rack units -->
    <rect x="180" y="113" width="38" height="10" rx="1.2" fill="#2e6daa" opacity="0.15"/>
    <rect x="180" y="126" width="38" height="10" rx="1.2" fill="#2e6daa" opacity="0.15"/>
    <rect x="180" y="139" width="38" height="10" rx="1.2" fill="#2e6daa" opacity="0.15"/>
    <rect x="180" y="152" width="38" height="10" rx="1.2" fill="#2e6daa" opacity="0.15"/>
    <!-- Slot borders -->
    <rect x="180" y="113" width="38" height="10" rx="1.2" fill="none" stroke="#1b3f6e" stroke-width="1.1"/>
    <rect x="180" y="126" width="38" height="10" rx="1.2" fill="none" stroke="#1b3f6e" stroke-width="1.1"/>
    <rect x="180" y="139" width="38" height="10" rx="1.2" fill="none" stroke="#1b3f6e" stroke-width="1.1"/>
    <rect x="180" y="152" width="38" height="10" rx="1.2" fill="none" stroke="#1b3f6e" stroke-width="1.1"/>
    <!-- LED dots -->
    <circle cx="185" cy="118" r="2" fill="#2e6daa"/>
    <circle cx="185" cy="131" r="2" fill="#2e6daa"/>
    <circle cx="185" cy="144" r="2" fill="#2e6daa"/>
    <circle cx="185" cy="157" r="2" fill="#2e6daa"/>
    <!-- Vent lines -->
    <g stroke="#1b3f6e" stroke-width="0.6" opacity="0.45">
      <line x1="191" y1="116" x2="212" y2="116"/>
      <line x1="191" y1="119" x2="212" y2="119"/>
      <line x1="191" y1="129" x2="212" y2="129"/>
      <line x1="191" y1="132" x2="212" y2="132"/>
      <line x1="191" y1="142" x2="212" y2="142"/>
      <line x1="191" y1="145" x2="212" y2="145"/>
      <line x1="191" y1="155" x2="212" y2="155"/>
      <line x1="191" y1="158" x2="212" y2="158"/>
    </g>
  </g>

  <!-- ── WORDMARK ── -->
  <line x1="28" y1="260" x2="292" y2="260"
        stroke="#2e6daa" stroke-width="1" opacity="0.32"/>
  <text x="160" y="290"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="33"
        font-weight="700"
        letter-spacing="10"
        fill="#1b3f6e"
        text-anchor="middle">Q-WORKS</text>
</svg>
